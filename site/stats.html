<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리치마작 4지선다 학습 — 통계</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="stats">
  <div class="page quiz-wrap">
    <header class="site-header">
      <h1>통계</h1>
      <p>유형별·난이도별 정답률입니다. 아직 풀지 않은 항목은 "-"로 표시됩니다.</p>
      <nav class="topnav" aria-label="주요 이동">
        <a href="index.html">홈</a>
        <a href="review.html">오답 노트</a>
        <a href="stats.html" aria-current="page">통계</a>
        <a href="showcase.html">타일 쇼케이스</a>
      </nav>
    </header>

    <main>
      <section class="card">
        <h2>전체</h2>
        <p id="stats-overall">아직 기록이 없습니다.</p>
      </section>

      <section class="card">
        <h2>유형별 정답률</h2>
        <div class="table-scroll">
          <table class="stats-table">
            <thead>
              <tr>
                <th scope="col">유형</th>
                <th scope="col">정답 / 시도</th>
                <th scope="col">정답률</th>
              </tr>
            </thead>
            <tbody id="stats-type-body"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>난이도별 정답률</h2>
        <div class="table-scroll">
          <table class="stats-table">
            <thead>
              <tr>
                <th scope="col">난이도</th>
                <th scope="col">정답 / 시도</th>
                <th scope="col">정답률</th>
              </tr>
            </thead>
            <tbody id="stats-diff-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>약한 유형은 퀴즈에서 더 자주 출제됩니다(적응형 출제).</p>
    </footer>
  </div>

  <script src="js/tiles.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
