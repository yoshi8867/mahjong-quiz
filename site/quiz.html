<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리치마작 4지선다 학습 — 퀴즈</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="quiz">
  <div class="page quiz-wrap">
    <header class="site-header">
      <h1>퀴즈</h1>
      <nav class="topnav" aria-label="주요 이동">
        <a href="index.html">홈</a>
        <a href="review.html">오답 노트</a>
        <a href="stats.html">통계</a>
        <a href="showcase.html">타일 쇼케이스</a>
      </nav>
    </header>

    <main>
      <!-- 조건에 맞는 문제가 없을 때 -->
      <section class="empty-state" id="empty-state" hidden>
        <p>조건에 맞는 문제가 없습니다.</p>
        <p><a href="index.html" class="primary-btn">홈에서 다시 설정하기</a></p>
      </section>

      <!-- 문제 패널 -->
      <section class="card" id="quiz-main" aria-live="polite">
        <div class="q-meta">
          <span class="badge" id="q-type">유형</span>
          <span class="badge" id="q-diff">난이도</span>
        </div>

        <p class="q-prompt" id="q-prompt"></p>

        <div class="q-field" id="q-hand" hidden></div>
        <div class="q-field" id="q-dora" hidden></div>
        <div class="q-field" id="q-melds" hidden></div>
        <div class="q-field" id="q-discards" hidden></div>

        <div class="choices" id="choices"></div>

        <div class="explanation" id="explanation" hidden></div>

        <div class="next-row">
          <button type="button" class="primary-btn" id="next-btn">다음 문제</button>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>보기를 클릭하면 즉시 정오와 해설이 표시됩니다.</p>
    </footer>
  </div>

  <script src="js/tiles.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
